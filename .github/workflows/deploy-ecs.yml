# 推送 main 或通过 Actions 手动运行：SSH 到 ECS 执行 deploy/aliyun-ecs.sh
#
# 在 GitHub 仓库 Settings → Secrets and variables → Actions 中配置：
#   DEPLOY_HOST      ECS 公网 IP 或域名
#   DEPLOY_USER      SSH 用户名（如 root、deploy）
#   DEPLOY_SSH_KEY   对应用户的私钥全文（含 -----BEGIN ...）
# 可选：
#   DEPLOY_SSH_PORT  默认 22
#   DEPLOY_PATH      服务器上仓库绝对路径，默认 /opt/spark
#   DEPLOY_PUBLIC_URL  公网站点根，默认 https://sparksquad.club（用于部署后外网冒烟）

name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ecs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}'
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="/opt/spark"
            fi
            cd "$DEPLOY_PATH"
            bash deploy/aliyun-ecs.sh

      - name: Public smoke (must be 401, not 404)
        env:
          PUBLIC_URL: ${{ secrets.DEPLOY_PUBLIC_URL }}
        run: |
          set -euo pipefail
          BASE="${PUBLIC_URL:-https://sparksquad.club}"
          BASE="${BASE%/}"
          echo "Checking $BASE ..."
          health="$(curl -fsS --max-time 20 "$BASE/health" || true)"
          echo "health: $health"
          echo "$health" | grep -q '"pubgClan":true'

          for path in /api/user/public/1 /api/user/pubg/clan /api/user/pubg/mastery; do
            code="$(curl -sS -o /tmp/body.txt -w '%{http_code}' --max-time 20 "$BASE$path" || true)"
            body="$(cat /tmp/body.txt || true)"
            echo "$path -> $code $body"
            if [ "$code" != "401" ]; then
              echo "::error::$path expected 401, got $code (404=旧后端未挂载新路由)"
              exit 1
            fi
          done
          echo "Public smoke OK"
