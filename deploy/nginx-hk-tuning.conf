# 在 /etc/nginx/conf.d/spark.conf 的 HTTPS server { } 内 include 本文件：
#   include /opt/spark/deploy/nginx-hk-tuning.conf;
#
# 或在 certbot 生成的 443 server 块中手动合并相同配置。
# root 路径请与 WEB_ROOT 一致（ubuntu 用户默认 /home/ubuntu/www/xinghuo）。

# 压缩：弱网下减少传输体积（HTML/JS/CSS/JSON/SVG）
gzip on;
gzip_vary on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

# TLS 会话由 certbot 的 options-ssl-nginx.conf 管理，此处勿重复 ssl_session_* 指令

# 带 hash 的构建产物长期缓存（Vite dist/assets）
location ^~ /assets/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
}

# ^~ 必须加：否则 ~* \.(jpg|png|...)$ 会抢走 /api/uploads/*.png 与 /api/media 等 API 请求
location ^~ /api/ {
    proxy_pass http://xinghuo_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 15s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;
}

location ~* \.(?:ico|png|jpg|jpeg|gif|webp|svg|woff2?)$ {
    expires 14d;
    add_header Cache-Control "public, max-age=1209600";
    try_files $uri =404;
}

# 兼容旧链接；新前端优先走 /api/media?path=
location ^~ /uploads/ {
    proxy_pass http://xinghuo_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
}
