# 在 /etc/nginx/conf.d/spark.conf 的 HTTPS server { } 内 include：
#   include /opt/spark/deploy/nginx-hk-tuning.conf;
#
# 面向香港源站 → 大陆用户：减体积、长缓存、稳代理。
# 不能替代 CN2/专线；真实「优化回国线路」见 deploy/README.md 第六节。

# —— 传输体积 ——
gzip on;
gzip_vary on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    application/wasm
    font/woff2;

# 静态文件缓存句柄（弱网重复打开更快）
open_file_cache max=5000 inactive=60s;
open_file_cache_valid 30s;
open_file_cache_min_uses 2;
open_file_cache_errors on;

# —— 带 hash 的构建产物 ——
location ^~ /assets/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    add_header X-Content-Type-Options nosniff always;
    access_log off;
    try_files $uri =404;
}

# ^~ 必须：避免 ~* \.(jpg|png)$ 抢走 /api/uploads、/api/media
location ^~ /api/ {
    proxy_pass http://xinghuo_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 16 32k;
    proxy_busy_buffers_size 64k;
    proxy_connect_timeout 15s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;
    # 跨境偶发抖动时少立刻失败
    proxy_next_upstream error timeout http_502 http_503;
    proxy_next_upstream_tries 2;
}

location ~* \.(?:ico|png|jpg|jpeg|gif|webp|svg|woff2?)$ {
    expires 14d;
    add_header Cache-Control "public, max-age=1209600";
    access_log off;
    try_files $uri =404;
}

# 兼容旧链接；新前端优先 /api/media?path=
location ^~ /uploads/ {
    proxy_pass http://xinghuo_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    access_log off;
}

# SPA：HTML 短缓存，避免发版后用户长期卡旧壳
location = /index.html {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
}

location / {
    try_files $uri $uri/ /index.html;
}
